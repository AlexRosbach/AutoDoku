<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b36"/>
      <stop offset="100%" stop-color="#0a2a52"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#173060"/>
      <stop offset="100%" stop-color="#0a1f44"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b9bd5"/>
      <stop offset="100%" stop-color="#2563a8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="lensClip">
      <circle cx="104" cy="104" r="72"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- Magnifying glass lens (ring) -->
  <circle cx="104" cy="104" r="72" fill="url(#lensGrad)" stroke="#5b9bd5" stroke-width="10"/>

  <!-- Network inside lens -->
  <g clip-path="url(#lensClip)" filter="url(#glow)">
    <!-- Spoke lines from center -->
    <line x1="104" y1="104" x2="68"  y2="68"  stroke="#5b9bd5" stroke-width="4" opacity="0.7"/>
    <line x1="104" y1="104" x2="140" y2="68"  stroke="#5b9bd5" stroke-width="4" opacity="0.7"/>
    <line x1="104" y1="104" x2="68"  y2="140" stroke="#5b9bd5" stroke-width="4" opacity="0.7"/>
    <line x1="104" y1="104" x2="140" y2="140" stroke="#5b9bd5" stroke-width="4" opacity="0.7"/>
    <!-- Cross links -->
    <line x1="68"  y1="68"  x2="140" y2="68"  stroke="#3a7ac8" stroke-width="2.5" opacity="0.45"/>
    <line x1="68"  y1="140" x2="140" y2="140" stroke="#3a7ac8" stroke-width="2.5" opacity="0.45"/>
    <line x1="68"  y1="68"  x2="68"  y2="140" stroke="#3a7ac8" stroke-width="2.5" opacity="0.45"/>
    <line x1="140" y1="68"  x2="140" y2="140" stroke="#3a7ac8" stroke-width="2.5" opacity="0.45"/>
    <!-- Corner nodes -->
    <circle cx="68"  cy="68"  r="9"  fill="#5b9bd5"/>
    <circle cx="140" cy="68"  r="9"  fill="#5b9bd5"/>
    <circle cx="68"  cy="140" r="9"  fill="#5b9bd5"/>
    <circle cx="140" cy="140" r="9"  fill="#5b9bd5"/>
    <!-- Center node (brightest) -->
    <circle cx="104" cy="104" r="13" fill="#70d0f8"/>
    <circle cx="104" cy="104" r="6"  fill="white"/>
  </g>

  <!-- Handle -->
  <line x1="159" y1="159" x2="210" y2="210" stroke="url(#handleGrad)"
        stroke-width="20" stroke-linecap="round"/>

  <!-- Document lines (lower right corner) -->
  <rect x="148" y="188" width="82" height="12" rx="5" fill="#5b9bd5" opacity="0.70"/>
  <rect x="148" y="208" width="60" height="10" rx="5" fill="#5b9bd5" opacity="0.50"/>
  <rect x="148" y="226" width="70" height="10" rx="5" fill="#5b9bd5" opacity="0.35"/>
</svg>
